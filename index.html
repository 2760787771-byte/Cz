<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏资源导航 | Game Resources</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        :root {
            --bg-color: #f0f4f9;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --sub-text: #718096;
            --primary: #4080ff;
            --hover-bg: #4080ff;
            --hover-text: #fff;
            --success-color: #27ae60;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
        }

        .dark {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-color: #e2e8f0;
            --sub-text: #a0aec0;
            --shadow: 0 2px 10px rgba(0, 0, 0.25);
        }

        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            padding: 50px 20px;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-size: 30px;
            color: var(--text-color);
            font-weight: 600;
        }

        .desc {
            color: var(--sub-text);
            margin-top: 6px;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #themeBtn {
            border: none;
            background: var(--card-bg);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 18px;
            color: var(--text-color);
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .lang-btn {
            min-width: 70px;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 14px;
            overflow: hidden;
        }
        .lang-btn:hover {
            background: var(--hover-bg);
            color: var(--hover-text);
        }

        /* 通用语言文字容器样式（一二级菜单统一） */
        .lang-text {
            position: relative;
            display: inline-block;
            width: 100%;
            text-align: center;
            height: 1.2em;
        }
        .menu-main .lang-text,
        .sub-item .lang-text {
            text-align: left;
        }

        .zh, .en {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            white-space: nowrap;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .zh {
            opacity: 1;
            transform: translateX(0);
        }
        .en {
            opacity: 0;
            transform: translateX(10px);
            pointer-events: none;
        }

        body.en-lang .zh {
            opacity: 0;
            transform: translateX(-10px);
            pointer-events: none;
        }
        body.en-lang .en {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .menu-wrap {
            margin-bottom: 12px;
        }

        .menu-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            color: var(--text-color);
            padding: 18px 22px;
            border-radius: 14px;
            font-size: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.28s ease;
        }

        .menu-main:hover {
            background: var(--hover-bg);
            color: var(--hover-text);
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(64, 128, 255, 0.25);
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .sub-menu {
            padding-left: 20px;
            margin-top: 4px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: 
                max-height 0.8s cubic-bezier(0.33, 1, 0.68, 1),
                opacity 0.65s ease,
                transform 0.7s ease,
                padding 0.6s ease;
        }

        .menu-wrap.active .sub-menu {
            max-height: 800px;
            opacity: 1;
            transform: translateY(0);
            padding-bottom: 6px;
        }

        .fa-chevron-down {
            transition: transform 0.7s cubic-bezier(0.33,1,0.68,1);
        }
        .menu-wrap.active .fa-chevron-down {
            transform: rotate(180deg);
        }

        .sub-item {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--text-color);
            padding: 14px 22px;
            font-size: 15px;
            border-radius: 10px;
            margin: 6px 0;
            transition: all 0.22s ease;
            cursor: pointer;
            user-select: none;
        }

        .sub-item:hover {
            background: rgba(64, 128, 255, 0.12);
            padding-left: 26px;
        }

        .sub-item span {
            transition: color 0.6s ease;
        }
        .success span {
            color: var(--success-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 class="main-title">
                    <span class="lang-text">
                        <span class="zh">游戏资源导航</span>
                        <span class="en">Game Resources</span>
                    </span>
                </h1>
                <p class="desc">
                    <span class="lang-text">
                        <span class="zh">Minecraft / Terraria</span>
                        <span class="en">Minecraft / Terraria</span>
                    </span>
                </p>
            </div>
            <div class="header-right">
                <button class="lang-btn" id="langSwitch">
                    <span class="lang-text">
                        <span class="zh">EN</span>
                        <span class="en">CN</span>
                    </span>
                </button>
                <button id="themeBtn"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>

        <!-- Minecraft -->
        <div class="menu-wrap">
            <div class="menu-main">
                <div class="menu-left">
                    <i class="fa-solid fa-cube icon"></i>
                    <span class="lang-text">
                        <span class="zh">Minecraft</span>
                        <span class="en">Minecraft</span>
                    </span>
                </div>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="sub-menu">
                <div class="sub-item">
                    <i class="fa-solid fa-box icon"></i>
                    <span class="lang-text">
                        <span class="zh">整合包</span>
                        <span class="en">Modpack</span>
                    </span>
                </div>
                <div class="sub-item">
                    <i class="fa-solid fa-puzzle-piece icon"></i>
                    <span class="lang-text">
                        <span class="zh">Mod</span>
                        <span class="en">Mod</span>
                    </span>
                </div>
                <div class="sub-item">
                    <i class="fa-solid fa-lightbulb icon"></i>
                    <span class="lang-text">
                        <span class="zh">光影包</span>
                        <span class="en">Shaders</span>
                    </span>
                </div>
                <div class="sub-item">
                    <i class="fa-solid fa-images icon"></i>
                    <span class="lang-text">
                        <span class="zh">材质包</span>
                        <span class="en">Resource Pack</span>
                    </span>
                </div>
                <div class="sub-item">
                    <i class="fa-solid fa-crosshairs icon"></i>
                    <span class="lang-text">
                        <span class="zh">PvP 材质包</span>
                        <span class="en">PvP Pack</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- Terraria -->
        <div class="menu-wrap">
            <div class="menu-main">
                <div class="menu-left">
                    <i class="fa-solid fa-earth-america icon"></i>
                    <span class="lang-text">
                        <span class="zh">Terraria</span>
                        <span class="en">Terraria</span>
                    </span>
                </div>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="sub-menu">
                <div class="sub-item">
                    <i class="fa-solid fa-book icon"></i>
                    <span class="lang-text">
                        <span class="zh">维基</span>
                        <span class="en">Wiki</span>
                    </span>
                </div>
                <div class="sub-item">
                    <i class="fa-solid fa-puzzle-piece icon"></i>
                    <span class="lang-text">
                        <span class="zh">模组</span>
                        <span class="en">Mods</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- 联机 -->
        <div class="menu-wrap">
            <div class="menu-main">
                <div class="menu-left">
                    <i class="fa-solid fa-link icon"></i>
                    <span class="lang-text">
                        <span class="zh">联机</span>
                        <span class="en">Multiplayer</span>
                    </span>
                </div>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="sub-menu">
                <div class="sub-item" onclick="copyMc(this)">
                    <i class="fa-solid fa-cube icon"></i>
                    <span class="lang-text">
                        <span class="zh">Minecraft (点击复制)</span>
                        <span class="en">Minecraft (Click to Copy)</span>
                    </span>
                </div>
                <div class="sub-item" onclick="copyTr(this)">
                    <i class="fa-solid fa-earth-america icon"></i>
                    <span class="lang-text">
                        <span class="zh">Terraria (点击复制)</span>
                        <span class="en">Terraria (Click to Copy)</span>
                    </span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 深浅色切换
        const themeBtn = document.getElementById('themeBtn');
        const icon = themeBtn.querySelector('i');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            icon.className = document.body.classList.contains('dark') 
                ? 'fa-solid fa-sun' 
                : 'fa-solid fa-moon';
        });

        // 菜单展开
        const menuWraps = document.querySelectorAll('.menu-wrap');
        menuWraps.forEach(wrap => {
            const main = wrap.querySelector('.menu-main');
            main.addEventListener('click', () => {
                wrap.classList.toggle('active');
            });
        });

        // 语言切换
        const langSwitch = document.getElementById('langSwitch');
        langSwitch.addEventListener('click', () => {
            document.body.classList.toggle('en-lang');
        });

        // 复制 MC
        function copyMc(el) {
            const text = "frp-hat.com:43687";
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);

            const langText = el.querySelector(".lang-text");
            const zh = langText.querySelector(".zh");
            const en = langText.querySelector(".en");
            const oldZh = zh.innerText;
            const oldEn = en.innerText;
            
            zh.innerText = "✅ 复制成功";
            en.innerText = "✅ Copied";
            el.classList.add("success");

            setTimeout(() => {
                zh.innerText = oldZh;
                en.innerText = oldEn;
                el.classList.remove("success");
            }, 2000);
        }

        // 复制 TR
        function copyTr(el) {
            const text = "frp-hat.com:41825";
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);

            const langText = el.querySelector(".lang-text");
            const zh = langText.querySelector(".zh");
            const en = langText.querySelector(".en");
            const oldZh = zh.innerText;
            const oldEn = en.innerText;
            
            zh.innerText = "✅ 复制成功";
            en.innerText = "✅ Copied";
            el.classList.add("success");

            setTimeout(() => {
                zh.innerText = oldZh;
                en.innerText = oldEn;
                el.classList.remove("success");
            }, 2000);
        }
    </script>
</body>
</html>
